version: '3.8'

services:
  # --- Veritabanı Servisi ---
  db:
    image: postgres:15-alpine
    container_name: olykube-db
    restart: always
    environment:
      # YAML artık değerleri doğrudan .env dosyasından çekecek
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - olykube-network

  # --- Cache Servisi ---
  redis:
    image: redis:alpine
    container_name: olykube-redis
    restart: always
    networks:
      - olykube-network

  # --- FastAPI Backend ---
  api:
    build: .
    container_name: olykube-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - chromadb
    networks:
      - olykube-network
    # WSL/Docker Bridge üzerinden host'taki Ollama'ya ulaşmak için:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - chroma_cache:/root/.cache/chroma   

  chromadb:
    image: chromadb/chroma:latest
    container_name: olykube-chromadb
    restart: always
    environment:
      - IS_PERSISTENT=TRUE
    volumes:
      - chromadb_data:/chroma/chroma  # <- Bu satır çok kritik!
    networks:
      - olykube-network         

networks:
  olykube-network:
    driver: bridge

volumes:
  postgres_data:
  chromadb_data:
  chroma_cache: